default_language_version:
  python: python3.12

exclude: '^(node_modules/|\.git/)'

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # v6.0.0
    hooks:
      # The IndexNow key file must contain ONLY the 32-char key (no trailing
      # newline) so the hosted file matches the key value exactly.
      - id: trailing-whitespace
        exclude: '^[A-Za-z0-9-]{8,128}\.txt$'
      - id: end-of-file-fixer
        exclude: '^[A-Za-z0-9-]{8,128}\.txt$'
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: mixed-line-ending

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: 3b3f7c3f57fe9925356faf5fe6230835138be230  # v0.15.17
    hooks:
      - id: ruff
        args: [--fix]
        types_or: [python, pyi]
      - id: ruff-format
        types_or: [python, pyi]

  - repo: https://github.com/gitleaks/gitleaks
    rev: 83d9cd684c87d95d656c1458ef04895a7f1cbd8e  # v8.30.1
    hooks:
      - id: gitleaks
