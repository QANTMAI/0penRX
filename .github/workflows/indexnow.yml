name: IndexNow submit

# Notifies the IndexNow network (Bing, Yandex, Seznam, Naver, Yep — one ping is
# shared with all) whenever the homepage's content actually changes. Google does
# NOT participate in IndexNow; Google discovers via the robots.txt Sitemap line +
# Search Console (see docs/SEO_INDEXNOW_PLAYBOOK.md).
#
# This is the deploy-time alternative to Cloudflare Crawler Hints, which is NOT
# usable on this site (proxying through Cloudflare conflicts with GitHub Pages'
# HTTPS cert renewal — see the playbook).

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'assets/catalog.js'
      - 'assets/app.js'
      - 'assets/styles.css'
      - 'sitemap.xml'
      - 'llms.txt'
      - 'drugs/**'
      - 'compare-platforms/**'
      - 'uninsured-guide/**'
      - 'privacy/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: indexnow
  cancel-in-progress: false

jobs:
  submit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      # Give GitHub Pages a moment to publish the changed content before we ping.
      - name: Wait for Pages to publish
        run: sleep 90
      # Node is preinstalled on the runner; the submitter has no dependencies.
      - name: Submit changed URLs to IndexNow
        run: node scripts/indexnow-submit.mjs --from-sitemap
