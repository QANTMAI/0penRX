# Coupon dataset refresh — the timed sentinel.
#
# Why this workflow exists:
#   Manufacturer copay cards and patient-assistance offers are time-boxed: they
#   expire at the end of the calendar year (and many cap out after ~12 fills).
#   The committed dataset (data/coupons.jsonl) is built by data/build_coupons.py,
#   which stamps each record with effective_date = Jan 1 and expiration_date =
#   Dec 31 of the CURRENT year. A static, never-rebuilt dataset would therefore
#   keep advertising last year's (now expired) offers as if they were live.
#
#   This sentinel keeps the dataset honest: the Jan-1 job re-stamps every record
#   to the new year the moment coupons would otherwise expire, and the monthly
#   job is a safety net that catches any coupon drift from a catalog change.
#
# How it stays compatible with branch protection on main:
#   This job never pushes to main. It gates on `build_coupons.py --check` (which
#   ignores the non-deterministic ingested_at stamp, so it fires only on a real
#   field change — normally just the Jan-1 rollover), validates the rebuilt data,
#   and opens a PR on a stable bot branch for a one-click human merge. Because the
#   PR is authored by GITHUB_TOKEN it does not itself trigger the CI workflow, so
#   the data is validated inline here instead.
name: Coupon dataset refresh

on:
  schedule:
    # Monthly safety-net — 1st of every month, 09:00 UTC.
    - cron: "0 9 1 * *"
    # Year-rollover — Jan 1, 06:00 UTC. Re-stamps effective/expiration dates so
    # coupons that expired at midnight on Dec 31 are immediately refreshed.
    - cron: "0 6 1 1 *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Check for real coupon-data drift
        id: drift
        run: |
          # --check ignores the non-deterministic ingested_at timestamp, so this
          # exits 0 (no PR) on a routine month and non-zero only when a meaningful
          # field changed — e.g. the Jan-1 year rollover or a catalog edit.
          if python data/build_coupons.py --check; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Coupon dataset is current — nothing to do."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Coupon dataset has drifted — will rebuild and open a PR."
          fi

      - name: Rebuild dataset
        if: steps.drift.outputs.changed == 'true'
        run: python data/build_coupons.py --out data/coupons.jsonl

      - name: Validate rebuilt dataset
        if: steps.drift.outputs.changed == 'true'
        run: |
          python -m pip install --quiet pytest
          python -m pytest -q data/tests/test_build_coupons.py

      - name: Open refresh PR
        if: steps.drift.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="bot/coupons-refresh"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add data/coupons.jsonl
          git commit -m "chore: refresh coupon dataset (scheduled)"
          # Force-update the stable bot branch so repeat runs update the same PR
          # instead of piling up new ones.
          git push -f origin "$BRANCH"
          # Open the PR only if one isn't already open for this branch.
          if ! gh pr view "$BRANCH" --json state --jq '.state' >/dev/null 2>&1; then
            gh pr create \
              --base main --head "$BRANCH" \
              --title "chore: refresh coupon dataset (scheduled)" \
              --body "Automated coupon-dataset refresh (Jan-1 year rollover or a catalog change). Regenerated by \`data/build_coupons.py\` and validated by \`data/tests/test_build_coupons.py\` in this workflow run; field-level drift was confirmed via \`--check\` (ingested_at ignored). Safe to merge."
          else
            echo "A refresh PR is already open for $BRANCH; updated it in place."
          fi
