name: SBOM

# Generate a CycloneDX Software Bill of Materials for the backend Python
# dependencies whenever they change (and on release / on demand). Uploaded as a
# build artifact — a supply-chain transparency record (OWASP CycloneDX / ECMA-424).

on:
  push:
    branches: [main]
    paths:
      - 'backend/requirements.txt'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Generate CycloneDX SBOM
        run: |
          python -m pip install --upgrade pip
          pip install cyclonedx-bom
          cyclonedx-py requirements backend/requirements.txt -o backend-sbom.cdx.json
      - name: Upload SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: backend-sbom-cyclonedx
          path: backend-sbom.cdx.json
          if-no-files-found: error
