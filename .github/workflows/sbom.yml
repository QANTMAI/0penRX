name: SBOM

# Generate a CycloneDX Software Bill of Materials for the backend Python
# dependencies whenever they change (and on release / on demand). Uploaded as a
# build artifact — a supply-chain transparency record (OWASP CycloneDX / ECMA-424).

on:
  push:
    branches: [main]
    paths:
      - 'backend/requirements.txt'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sbom:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - name: Generate CycloneDX SBOM
        run: |
          python -m pip install --upgrade pip
          pip install cyclonedx-bom
          cyclonedx-py requirements backend/requirements.txt -o backend-sbom.cdx.json
      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: backend-sbom-cyclonedx
          path: backend-sbom.cdx.json
          if-no-files-found: error
