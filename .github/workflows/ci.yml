name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install ruff pytest
      - name: Lint
        run: ruff check .
      - name: Compile check
        run: python -m compileall backend data
      - name: Tests
        run: pytest -q
      # drugs/<slug>/index.html, sitemap.xml and the ItemList/noscript blocks in
      # index.html are generated from assets/catalog.js. Both generators have
      # always supported --check, but nothing ran it — so a catalog edit could
      # ship with the generated pages still showing the old data. It can't now.
      - name: Generated-file drift check
        run: |
          python data/build_drug_pages.py --check
          python data/build_static_seo.py --check

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Node is preinstalled on the runner; no setup-node action needed.
      - name: JS syntax check
        run: |
          for f in assets/*.js sw.js; do node --check "$f"; done
      # Guard against the B1-class bug: a curly quote used as an HTML attribute
      # delimiter inside a JS template string (e.g. class=”x”) is valid JS but
      # broken HTML, so node --check can't catch it — this grep does.
      - name: Guard against curly quotes in HTML attributes
        run: |
          if grep -rnP '=[\x{201C}\x{201D}]' assets/*.js sw.js; then
            echo "::error::Curly quote used as an HTML attribute delimiter in a JS template string — use straight quotes."
            exit 1
          fi
      - name: JS unit tests
        run: node --test
      # catalog-validator.js encodes the data rules (savings maths, price sanity,
      # enums, no catch-all category) but only console.logged them in the browser.
      # Run it for real so bad catalog data fails the PR instead of the page.
      - name: Catalog data validation
        run: node scripts/validate-catalog.mjs
