name: NADAC Ingestion

on:
  schedule:
    # Weekly on Thursday 09:00 UTC; NADAC publishes new weekly data midweek.
    - cron: "0 9 * * 4"
  workflow_dispatch:
    inputs:
      year:
        description: "NADAC dataset year"
        required: false
        default: "2026"
      limit:
        description: "Max rows to ingest (blank = full dataset)"
        required: false
        default: "5000"

permissions:
  contents: read

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - name: Run NADAC ingestion
        env:
          # Pull workflow_dispatch inputs into env vars so they are never
          # interpolated directly into the shell script body (shell injection).
          INGEST_YEAR: ${{ github.event.inputs.year || '2026' }}
          INGEST_LIMIT: ${{ github.event.inputs.limit || '5000' }}
        run: |
          echo "$INGEST_YEAR" | grep -qE '^[0-9]{4}$' || { echo "Invalid year: $INGEST_YEAR"; exit 1; }
          echo "$INGEST_LIMIT" | grep -qE '^[0-9]+$' || { echo "Invalid limit: $INGEST_LIMIT"; exit 1; }
          ARGS="--out data/processed/nadac.jsonl --year $INGEST_YEAR"
          if [ -n "$INGEST_LIMIT" ]; then ARGS="$ARGS --limit $INGEST_LIMIT"; fi
          python3 data/ingest_nadac.py $ARGS
      - name: Summarize output
        run: |
          echo "Records: $(wc -l < data/processed/nadac.jsonl)"
          head -n 1 data/processed/nadac.jsonl || true
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: nadac-jsonl
          path: data/processed/nadac.jsonl
          retention-days: 14
