<!DOCTYPE html>
<!-- Source for assets/apple-touch-icon.png. Render at 180x180 via headless Chrome:
     "/Applications/Google Chrome.app/.../Google Chrome" --headless \
       --screenshot=assets/apple-touch-icon.png --window-size=180,180 \
       --default-background-color=00000000 file://$PWD/assets/favicon-render.html
     iOS ignores SVG favicons and shows black behind transparency, so this PNG
     has a solid white field matching the brand mark. Edit favicon.svg too. -->
<html><head><meta charset="UTF-8"><style>
  html,body{margin:0;width:180px;height:180px}
  body{background:#fff;display:flex;align-items:center;justify-content:center}
  svg{width:148px;height:148px}
</style></head><body>
  <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
    <circle cx="32" cy="32" r="25" fill="none" stroke="#017a72" stroke-width="6"/>
    <text x="32" y="33" text-anchor="middle" dominant-baseline="central"
          font-family="Georgia,'Times New Roman',serif" font-size="32" font-weight="700"
          fill="#017a72">Rx</text>
  </svg>
</body></html>
