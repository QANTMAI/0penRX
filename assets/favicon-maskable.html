<!DOCTYPE html>
<!-- Source for assets/icon-maskable-512.png (PWA maskable icon). Filled teal
     background with the mark in the inner ~64% safe zone so platform masks
     (circle/squircle) never clip it. Rendered 512x512 via headless Chrome. -->
<html><head><meta charset="UTF-8"><style>
  html,body{margin:0;width:512px;height:512px}
  body{background:#017a72;display:flex;align-items:center;justify-content:center}
  svg{width:300px;height:300px}
</style></head><body>
  <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
    <circle cx="32" cy="32" r="25" fill="none" stroke="#ffffff" stroke-width="6"/>
    <text x="32" y="33" text-anchor="middle" dominant-baseline="central"
          font-family="Georgia,'Times New Roman',serif" font-size="32" font-weight="700"
          fill="#ffffff">Rx</text>
  </svg>
</body></html>
